<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .ad-container {
            margin: 20px auto;
            max-width: 800px;
        }
        .ad {
            margin: 10px;
            display: inline-block;
        }
        .timer {
            font-size: 24px;
            margin: 20px;
        }
        .skip-btn {
            display: none;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Advertisements</h1>
    <div class="ad-container">
        <div class="ad">
            <img src="https://via.placeholder.com/300x200?text=Ad+1" alt="Ad 1">
        </div>
        <div class="ad">
            <img src="https://via.placeholder.com/300x200?text=Ad+2" alt="Ad 2">
        </div>
        <div class="ad">
            <img src="https://via.placeholder.com/300x200?text=Ad+3" alt="Ad 3">
        </div>
    </div>
    <div class="timer">Ad will end in <span id="countdown">15</span> seconds</div>
    <button class="skip-btn" id="skipBtn">Skip Ad</button>

    <script>
        let countdown = 15;
        const countdownElement = document.getElementById('countdown');
        const skipBtn = document.getElementById('skipBtn');

        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timer);
                skipBtn.style.display = 'block';
                countdownElement.textContent = '0';
            }
        }, 1000);

        skipBtn.addEventListener('click', () => {
            window.location.href = 'page1.html';
        });
    </script>
</body>
</html>
